<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login</title>

<style>
body{
  font-family: Arial;
   background-image:url('Purple bg.jpeg');
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box{
  background:white;
  padding:30px;
  border-radius:12px;
  text-align:center;
  width:320px;
}

input{
  width:90%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  background:#6a11cb;
  color:white;
  border:none;
  width:100%;
  cursor:pointer;
  border-radius:6px;
}

#msg{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h2>Student Login</h2>

<form id="form">
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="roll" placeholder="Roll Number" required>
<button type="submit">Login</button>
</form>

<p id="msg"></p>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const roll = document.getElementById("roll").value.trim();

  // Create name from email
  let name = email.split("@")[0];
  name = name.replace(/[0-9]/g,"");
  name = name.charAt(0).toUpperCase() + name.slice(1);

  const student = {
    email: email,
    roll: roll,
    name: name
  };

  // Save data
  localStorage.setItem("student", JSON.stringify(student));

  document.getElementById("msg").innerText = "Login successful! Redirecting...";
  document.getElementById("msg").style.color = "green";

  // Redirect
  setTimeout(()=>{
    window.location.href = "card.html";
  },1000);
});
</script>

</body>
</html>
